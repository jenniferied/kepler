            margin: 0;
            padding: 0;
            box-sizing: border-box;

            background-color: #0a0a0a;
            color: #e0e0e0;

            letter-spacing: 0.1em;
            color: #e0e0e0;
            margin-bottom: 0.75rem;

            font-size: 0.7rem;
            color: #555;
            letter-spacing: 0.05em;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            cursor: default;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .footer {
            text-align: center;
            padding: 1rem 1.5rem 2rem;
            border-top: 1px solid #1a1a1a;
        }

        .footer a {
            font-size: 0.6rem;
            color: #444;
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .footer a:hover {
            color: #888;
        }

        /* Loading state */
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Datenschutzerkl&auml;rung</h1>
        <div class="subtitle">Drag the sphere to see Pretext text reflow</div>
    </div>

    <div id="canvas-container">
        <div id="loading">Loading Pretext...</div>
        <canvas id="canvas"></canvas>
    </div>

    <div class="footer">
        <a href="index.html">&larr; Back to Kepler</a>
    </div>

    <script type="module">
        import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext@0.0.4'

        // --- Datenschutz text (German privacy policy, from keplermusik.de) ---

        const FONT = '15px "IBM Plex Mono", monospace'
        const LINE_HEIGHT = 24
        const TEXT_COLOR = '#c8c8c8'
        const PADDING = 40
        const SPHERE_RADIUS = 60
        const SPHERE_PADDING = 14 // extra space around sphere for text clearance
        const MIN_SLOT_WIDTH = 30 // minimum width to attempt laying out text

        const canvas = document.getElementById('canvas')
        const container = document.getElementById('canvas-container')
        const loading = document.getElementById('loading')

        let dpr = window.devicePixelRatio || 1
        let canvasWidth = 0
        let canvasHeight = 0

        // Sphere state
        let sphereX = 300
        let sphereY = 400
        let dragging = false
        let dragOffsetX = 0
        let dragOffsetY = 0

        // Prepare text once fonts are loaded
        await document.fonts.ready
        const prepared = prepareWithSegments(DATENSCHUTZ_TEXT, FONT)
        loading.style.display = 'none'
        canvas.style.display = 'block'

        // --- Circle exclusion for a horizontal band ---
        // Returns the interval [left, right] where the circle blocks text,
        // or null if the circle doesn't intersect this band.
        function getCircleExclusion(cx, cy, cr, bandTop, bandBot) {
            // Circle doesn't overlap this band at all
            if (bandTop >= cy + cr || bandBot <= cy - cr) return null
            // Find the minimum vertical distance from circle center to the band
            let minDy
            if (cy >= bandTop && cy <= bandBot) {
                minDy = 0
            } else if (cy < bandTop) {
                minDy = bandTop - cy
            } else {
                minDy = cy - bandBot
            }
            if (minDy >= cr) return null
            const dx = Math.sqrt(cr * cr - minDy * minDy)
            return { left: cx - dx, right: cx + dx }
        }

        // --- Carve available line slots from a base interval minus blocked intervals ---
        function carveSlots(baseLeft, baseRight, blocked) {
            let slots = [{ left: baseLeft, right: baseRight }]
            for (const interval of blocked) {
                const next = []
                for (const slot of slots) {
                    if (interval.right <= slot.left || interval.left >= slot.right) {
                        next.push(slot)
                        continue
                    }
                    if (interval.left > slot.left) {
                        next.push({ left: slot.left, right: interval.left })
                    }
                    if (interval.right < slot.right) {
                        next.push({ left: interval.right, right: slot.right })
                    }
                }
                slots = next
            }
            return slots.filter(s => (s.right - s.left) >= MIN_SLOT_WIDTH)
        }

        // --- Draw the sphere with a glow ---
        function drawSphere(ctx, x, y, r) {
            // Outer glow
            const glowGradient = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2.2)
            glowGradient.addColorStop(0, 'rgba(80, 120, 200, 0.15)')
            glowGradient.addColorStop(0.5, 'rgba(60, 100, 180, 0.06)')
            glowGradient.addColorStop(1, 'rgba(40, 80, 160, 0)')
            ctx.beginPath()
            ctx.arc(x, y, r * 2.2, 0, Math.PI * 2)
            ctx.fillStyle = glowGradient
            ctx.fill()

            // Main sphere body
            const bodyGradient = ctx.createRadialGradient(
                x - r * 0.3, y - r * 0.3, r * 0.1,
                x, y, r
            )
            bodyGradient.addColorStop(0, '#4a7aaa')
            bodyGradient.addColorStop(0.4, '#2a4a6a')
            bodyGradient.addColorStop(0.8, '#1a2a3a')
            bodyGradient.addColorStop(1, '#0d1520')
            ctx.beginPath()
            ctx.arc(x, y, r, 0, Math.PI * 2)
            ctx.fillStyle = bodyGradient
            ctx.fill()

            // Subtle ring / atmosphere
            ctx.beginPath()
            ctx.arc(x, y, r + 1, 0, Math.PI * 2)
            ctx.strokeStyle = 'rgba(80, 140, 220, 0.3)'
            ctx.lineWidth = 1.5
            ctx.stroke()

            // Specular highlight
            const specGradient = ctx.createRadialGradient(
                x - r * 0.25, y - r * 0.3, 0,
                x - r * 0.25, y - r * 0.3, r * 0.5
            )
            specGradient.addColorStop(0, 'rgba(180, 210, 255, 0.35)')
            specGradient.addColorStop(1, 'rgba(180, 210, 255, 0)')
            ctx.beginPath()
            ctx.arc(x, y, r, 0, Math.PI * 2)
            ctx.fillStyle = specGradient
            ctx.fill()
        }

        // --- Main render ---
        function render() {
            const ctx = canvas.getContext('2d')
            const containerRect = container.getBoundingClientRect()
            const w = containerRect.width
            // Compute height based on text layout (we'll do a dry run)
            // For now use viewport height minus header/footer
            const viewH = Math.max(600, window.innerHeight - 140)

            dpr = window.devicePixelRatio || 1

            if (canvasWidth !== w || canvasHeight !== viewH) {
                canvasWidth = w
                canvasHeight = viewH
                canvas.width = Math.round(w * dpr)
                canvas.height = Math.round(viewH * dpr)
                canvas.style.width = w + 'px'
                canvas.style.height = viewH + 'px'
            }

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
            ctx.clearRect(0, 0, w, viewH)

            const textLeft = PADDING
            const textRight = w - PADDING
            const totalWidth = textRight - textLeft

            if (totalWidth < 60) return

            const effectiveR = SPHERE_RADIUS + SPHERE_PADDING

            // Layout text line by line, flowing around the sphere
            ctx.font = FONT
            ctx.fillStyle = TEXT_COLOR
            ctx.textBaseline = 'top'

            let cursor = { segmentIndex: 0, graphemeIndex: 0 }
            let y = PADDING

            while (y + LINE_HEIGHT <= viewH - 10) {
                const bandTop = y
                const bandBot = y + LINE_HEIGHT

                // Check if sphere intersects this line band
                const exclusion = getCircleExclusion(sphereX, sphereY, effectiveR, bandTop, bandBot)

                if (exclusion === null) {
                    // No obstacle -- full width line
                    const line = layoutNextLine(prepared, cursor, totalWidth)
                    if (line === null) break
                    ctx.fillStyle = TEXT_COLOR
                    ctx.fillText(line.text, textLeft, y)
                    cursor = line.end
                } else {
                    // Carve the line into slots around the sphere
                    const slots = carveSlots(textLeft, textRight, [exclusion])

                    if (slots.length === 0) {
                        // Line fully blocked by sphere, skip it
                        y += LINE_HEIGHT
                        continue
                    }

                    // Lay out text into each slot (left-to-right)
                    // Sort slots by x position
                    slots.sort((a, b) => a.left - b.left)

                    for (const slot of slots) {
                        const slotWidth = slot.right - slot.left
                        const line = layoutNextLine(prepared, cursor, slotWidth)
                        if (line === null) break
                        ctx.fillStyle = TEXT_COLOR
                        ctx.fillText(line.text, slot.left, y)
                        cursor = line.end
                    }
                }

                y += LINE_HEIGHT
            }

            // Draw the sphere on top
            drawSphere(ctx, sphereX, sphereY, SPHERE_RADIUS)
        }

        // --- Pointer events ---
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect()
            const clientX = e.touches ? e.touches[0].clientX : e.clientX
            const clientY = e.touches ? e.touches[0].clientY : e.clientY
            return {
                x: clientX - rect.left,
                y: clientY - rect.top,
            }
        }

        function isInSphere(px, py) {
            const dx = px - sphereX
            const dy = py - sphereY
            return dx * dx + dy * dy <= SPHERE_RADIUS * SPHERE_RADIUS
        }

        function onPointerDown(e) {
            const pos = getCanvasPos(e)
            if (isInSphere(pos.x, pos.y)) {
                dragging = true
                dragOffsetX = sphereX - pos.x
                dragOffsetY = sphereY - pos.y
                canvas.style.cursor = 'grabbing'
                e.preventDefault()
            }
        }

        function onPointerMove(e) {
            const pos = getCanvasPos(e)
            if (dragging) {
                sphereX = pos.x + dragOffsetX
                sphereY = pos.y + dragOffsetY
                requestAnimationFrame(render)
                e.preventDefault()
            } else {
                canvas.style.cursor = isInSphere(pos.x, pos.y) ? 'grab' : 'default'
            }
        }

        function onPointerUp() {
            if (dragging) {
                dragging = false
                canvas.style.cursor = 'grab'
            }
        }

        canvas.addEventListener('mousedown', onPointerDown)
        window.addEventListener('mousemove', onPointerMove)
        window.addEventListener('mouseup', onPointerUp)

        canvas.addEventListener('touchstart', onPointerDown, { passive: false })
        window.addEventListener('touchmove', onPointerMove, { passive: false })
        window.addEventListener('touchend', onPointerUp)

        // Resize handling
        window.addEventListener('resize', () => requestAnimationFrame(render))

        // Initial position: center-ish
        function initSpherePosition() {
            const rect = container.getBoundingClientRect()
            sphereX = rect.width * 0.55
            sphereY = 320
        }

        initSpherePosition()
        render()
    </script>
</body>
